name: Build & Release AI Arena

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS Intel
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS Apple Silicon
          - platform: ubuntu-22.04
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - run: npm install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Arena ${{ github.ref_name }}'
          releaseBody: 'AI Arena - Claude, GPT-4o, Gemini, Mistral, Grok, Llama, DeepSeek, Cohere'
          releaseDraft: false
          prerelease: false
